{% extends 'base.html' %}

{% block title %}Add New Certificate{% endblock %}

{% block content %}
<div class="container">
    <h1 style="text-align: center; margin-bottom: 30px;">Add New Certificate</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button type="submit" class="btn" style="background-color: #2ecc71;">Save Certificate</button>
        </div>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a href="{% url 'dashboard' %}"
            style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem; font-weight: bold;">&larr;
            Back to Dashboard</a>
    </div>
</div>
{% endblock %}
