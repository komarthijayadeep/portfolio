{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container" style="padding: 100px 0; text-align: center;">
    <h1 style="font-size: 6rem; color: var(--primary-color); margin-bottom: 20px;">404</h1>
    <h2 style="font-size: 2.5rem; margin-bottom: 30px;">Page Not Found</h2>

    <p
        style="color: var(--text-color); font-size: 1.2rem; margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto;">
        Oops! The page you are looking for does not exist. It might have been moved or deleted.
    </p>

    <a href="{% url 'home' %}" class="btn" style="padding: 12px 30px; font-size: 1.1rem;">
        &larr; Return to Home
    </a>
</div>
{% endblock %}
